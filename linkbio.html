<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Links | Massas La Bella</title>
    
    <link rel="stylesheet" href="linkbio.css">
</head>
<body>

    <!-- Background Animado -->
    <div class="bio-bg">
        <!-- Desktop SVG -->
        <svg class="desk-svg" viewBox="0 0 1440 900" preserveAspectRatio="none">
            <!-- Fundo suave -->
            <path d="M0,500 C400,300 1000,700 1440,400 L1440,900 L0,900 Z" fill="#F4C45A" opacity="0.15" />
            <!-- Caminho para o worm animado -->
            <path id="bio-stroke-path-desk" d="M-100,450 C400,250 1000,650 1540,350" fill="none" stroke="#F4C45A" stroke-width="12" stroke-linecap="round" opacity="0.5" />
        </svg>
        
        <!-- Mobile SVG -->
        <svg class="mob-svg" viewBox="0 0 400 900" preserveAspectRatio="none">
            <path d="M0,250 C150,150 250,550 400,450 L400,900 L0,900 Z" fill="#F4C45A" opacity="0.15" />
            <path id="bio-stroke-path-mob" d="M-50,200 C150,100 250,600 450,400" fill="none" stroke="#F4C45A" stroke-width="10" stroke-linecap="round" opacity="0.5" />
        </svg>
    </div>

    <!-- Conteúdo Principal -->
    <div class="bio-content">
        
        <!-- Cabeçalho / Logo -->
        <header class="bio-header">
            <img src="img/logo.webp" alt="Massas La Bella" class="bio-title">
            <div class="bio-subtitle">
                A verdadeira arte da massa artesanal 🍝✨
            </div>
        </header>

        <!-- Grade de Links -->
        <nav class="bio-links">
            
            <!-- Botão 1: Loja Online -->
            <a href="#" id="link-loja" class="bio-btn btn-loja">
                <!-- Shopping Bag Icon base -->
                <svg class="btn-icon" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm7 17H5V8h14v12zm-7-8c-1.66 0-3-1.34-3-3H7c0 2.76 2.24 5 5 5s5-2.24 5-5h-2c0 1.66-1.34 3-3 3z"/>
                </svg>
                <span class="btn-text">Ir para Loja Online</span>
                
                <!-- Motion Wrap: Loja Online -->
                <div class="motion-wrap motion-loja-wrap">
                    <div class="loja-bag">
                        <!-- Filled Shopping Bag -->
                        <svg viewBox="0 0 24 24">
                            <path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-2.76 0-5-2.24-5-5h2c0 1.66 1.34 3 3 3s3-1.34 3-3h2c0 2.76-2.24 5-5 5z"/>
                        </svg>
                        <div class="sparkle-container">
                            <!-- JS vai preencher os sparkles aqui -->
                        </div>
                    </div>
                </div>
            </a>

            <!-- Botão 2: WhatsApp -->
            <a href="#" id="link-whatsapp" class="bio-btn btn-whatsapp">
                <!-- WhatsApp Icon base -->
                <svg class="btn-icon" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38c1.45.79 3.08 1.21 4.79 1.21 5.46 0 9.91-4.45 9.91-9.91S17.5 2 12.04 2zm0 16.51c-1.47 0-2.92-.39-4.2-1.15l-.3-.18-3.12.82.83-3.04-.2-.31a8.26 8.26 0 0 1-1.26-4.38c0-4.54 3.7-8.24 8.24-8.24 4.54 0 8.24 3.7 8.24 8.24 0 4.54-3.7 8.24-8.24 8.24zm4.51-6.17c-.25-.13-1.47-.73-1.69-.81-.23-.08-.39-.13-.55.13-.17.25-.64.81-.79.98-.15.17-.3.19-.55.06-.25-.13-1.05-.39-2-1.24-.74-.66-1.24-1.47-1.39-1.72-.15-.25-.02-.38.11-.5.11-.11.25-.29.37-.44.13-.15.17-.25.25-.41.08-.17.04-.31-.02-.44-.06-.13-.55-1.33-.76-1.82-.2-.48-.41-.42-.55-.42h-.47c-.17 0-.44.06-.67.31-.23.25-.87.85-.87 2.07 0 1.22.89 2.4 1.01 2.56.13.17 1.75 2.67 4.24 3.74.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.15-1.18-.06-.1-.23-.16-.48-.29z"/>
                </svg>
                <span class="btn-text">Dúvidas via WhatsApp</span>
                
                <!-- Motion Wrap: WhatsApp -->
                <div class="motion-wrap motion-whatsapp-wrap">
                    <div class="whatsapp-dialog">
                        <!-- Chat Bubble SVG -->
                        <svg viewBox="0 0 24 24">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                        </svg>
                        <div class="dialog-dots">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            </a>

            <!-- Botão 3: Instagram -->
            <a href="#" id="link-instagram" class="bio-btn btn-instagram">
                <!-- Instagram Icon base -->
                <svg class="btn-icon" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2.16c3.2 0 3.58.01 4.85.07 3.25.15 4.77 1.69 4.92 4.92.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.15 3.23-1.66 4.77-4.92 4.92-1.27.06-1.64.07-4.85.07s-3.58-.01-4.85-.07c-3.26-.15-4.77-1.69-4.92-4.92-.06-1.27-.07-1.64-.07-4.85s.01-3.58.07-4.85c.15-3.23 1.66-4.77 4.92-4.92 1.27-.06 1.64-.07 4.85-.07M12 0C8.74 0 8.33.01 7.05.07 2.73.27.27 2.73.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.2 4.32 2.66 6.78 6.98 6.98 1.28.06 1.69.07 4.95.07s3.67-.01 4.95-.07c4.32-.2 6.78-2.66 6.98-6.98.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95C18.73 2.73 16.27.27 11.95.07 10.67.01 10.26 0 12 0zm0 5.84A6.16 6.16 0 1 0 18.16 12 6.16 6.16 0 0 0 12 5.84zm0 10.16A4 4 0 1 1 16 12a4 4 0 0 1-4 4zm6.41-10.4a1.44 1.44 0 1 1-2.88 0 1.44 1.44 0 0 1 2.88 0z"/>
                </svg>
                <span class="btn-text">Nosso Instagram</span>
                
                <!-- Motion Wrap: Instagram -->
                <div class="motion-wrap motion-instagram-wrap">
                    <div class="insta-camera-emoji">📸</div>
                    <div id="insta-hearts-container"></div>
                </div>
            </a>

            <!-- Botão 4: Website -->
            <a href="#" id="link-website" class="bio-btn btn-website">
                <!-- Website Icon base -->
                <svg class="btn-icon" width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span class="btn-text">Visitar Nosso Site</span>
                
                <!-- Motion Wrap: Website -->
                <div class="motion-wrap motion-website-wrap">
                    <div class="web-motion-icon">
                        <!-- Globo SVG -->
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </div>
                </div>
            </a>
            
        </nav>
    </div>

    <!-- Rodapé -->
    <footer class="bio-footer">
        <p>MASSAS LA BELLA © 2026 - FEITO COM AMOR 💛</p>
        <p><a href="#">DESENVOLVIDO POR CANEDO</a></p>
    </footer>

    <!-- GSAP Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="linkbio.js"></script>
</body>
</html>
